name: Build toolchain
on: workflow_dispatch

env:
  MIN_IOS: "15.0"
  PREFIX: "/var/jb/usr"

jobs:
  # ============================================================
  # clang + lld（4 个版本 × 2 架构）
  # ============================================================
  build-clang:
    strategy:
      matrix:
        ver: [18, 20]
        arch: [arm64, arm64e]
    runs-on: macos-latest
    steps:
      - name: 安装构建依赖
        run: brew install cmake ninja dpkg

      - name: 检出 LLVM 源码
        run: |
          if [ "${{ matrix.ver }}" = "18" ]; then
            BRANCH=llvmorg-18.1.8
          else
            BRANCH=llvmorg-20.1.0
          fi
          git clone --depth 1 --branch $BRANCH https://github.com/llvm/llvm-project.git

      - name: 配置并编译 clang + lld
        run: |
          set -ex
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          cd llvm-project && mkdir build && cd build
          cmake ../llvm -G Ninja \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=$MIN_IOS \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="ARM;AArch64" \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DDEFAULT_SYSROOT=$SDK \
            -DLLVM_BUILD_TOOLS=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_BUILD_UTILS=OFF \
            -DLLVM_ENABLE_PLUGINS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_LIBXML2=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
            -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
            -DCMAKE_EXE_LINKER_FLAGS="-Wl,-dead_strip"
          ninja clang lld

      - name: 安装并校验
        run: |
          set -ex
          DESTDIR=$(pwd)/deb-root ninja -C llvm-project/build install
          cd deb-root
          for bin in var/jb/usr/bin/clang var/jb/usr/bin/lld; do
            echo "=== 检查: $bin ==="
            otool -L "$bin"
            if otool -L "$bin" | tail -n +2 | awk '{print $1}' | grep -qE '^(/usr/local|/opt/homebrew|/Library/Developer|@rpath)'; then
              echo "❌ 发现 macOS 依赖"
              exit 1
            fi
            echo "✅ iOS 兼容性通过"
          done

      - name: 打包 .deb
        run: |
          set -ex
          cd deb-root
          mkdir -p DEBIAN
          printf 'Package: com.clang-toolchain.ios\nName: Clang Toolchain\nVersion: %s.1.0\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: Clang %s + LLD for iOS %s (rootless)\nMaintainer: rootless\nSection: Development\n' \
            "${{ matrix.ver }}" "$MIN_IOS" "${{ matrix.ver }}" "${{ matrix.arch }}" \
            > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root clang-${{ matrix.ver }}-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: clang-${{ matrix.ver }}-${{ matrix.arch }}-deb
          path: clang-${{ matrix.ver }}-${{ matrix.arch }}-rootless.deb

  # ============================================================
  # 其余工具（串行：popt → rsync → make → lz4 → perl → odcctools → swift）
  # ============================================================
  build-tools:
    strategy:
      matrix:
        arch: [arm64, arm64e]
    runs-on: macos-latest
    steps:
      - name: 安装构建依赖
        run: brew install dpkg autoconf automake libtool

      - name: 设置环境变量
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK=${SDK}" >> $GITHUB_ENV
          echo "CROSS_CC=$(xcrun --sdk iphoneos -f clang) -arch ${{ matrix.arch }} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}" >> $GITHUB_ENV
          echo "CROSS_CXX=$(xcrun --sdk iphoneos -f clang++) -arch ${{ matrix.arch }} -isysroot ${SDK} -stdlib=libc++ -miphoneos-version-min=${MIN_IOS}" >> $GITHUB_ENV
          echo "CFLAGS=-arch ${{ matrix.arch }} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}" >> $GITHUB_ENV
          echo "LDFLAGS=-arch ${{ matrix.arch }} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}" >> $GITHUB_ENV
          echo "ARCH_FLAGS=-arch ${{ matrix.arch }} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}" >> $GITHUB_ENV
          echo "HOST=arm64-apple-darwin" >> $GITHUB_ENV
          echo "STAGING=${GITHUB_WORKSPACE}/staging" >> $GITHUB_ENV
          echo "J=$(sysctl -n hw.ncpu)" >> $GITHUB_ENV

      - name: 写入通用校验脚本
        run: |
          cat > /tmp/check-ios << 'CHECK'
          #!/bin/bash
          set -e
          BIN="$1"
          if [ ! -f "$BIN" ]; then
            echo "⚠️  跳过校验（文件不存在: $BIN）"
            exit 0
          fi
          echo "=== otool -L $BIN ==="
          otool -L "$BIN"
          LIBS=$(otool -L "$BIN" | tail -n +2 | awk '{print $1}')
          FORBIDDEN="^(/usr/local|/opt/homebrew|/Library/Developer|@rpath)"
          for lib in $LIBS; do
            if echo "$lib" | grep -qE "$FORBIDDEN"; then
              echo "❌ 发现 macOS 依赖: $lib"
              exit 1
            fi
          done
          echo "✅ 只链接 iOS 系统库，兼容性通过"
CHECK
          chmod +x /tmp/check-ios

      # ========================================================
      # 1. popt
      # ========================================================
      - name: "[1/7] popt - 编译"
        run: |
          set -ex
          curl -LO https://ftp.osuosl.org/pub/rpm/popt/releases/popt-1.x/popt-1.19.tar.gz
          tar xzf popt-1.19.tar.gz && cd popt-1.19
          ./configure \
            --host=$HOST \
            --prefix=$PREFIX \
            --disable-dependency-tracking \
            --disable-nls \
            --enable-static \
            --disable-shared \
            CC="$CROSS_CC" \
            CFLAGS="$CFLAGS" \
            LDFLAGS="$LDFLAGS"
          make -j$J
          make install DESTDIR=$STAGING
          /tmp/check-ios $STAGING/var/jb/usr/lib/libpopt.a

      - name: "[1/7] popt - 打包"
        run: |
          set -ex
          cd $STAGING && mkdir -p DEBIAN
          printf 'Package: org.popt.popt\nName: popt\nVersion: 1.19\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: Popt library (rootless)\nMaintainer: rootless\nSection: Libraries\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b staging popt-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: popt-${{ matrix.arch }}-deb
          path: popt-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 2. rsync
      # ========================================================
      - name: "[2/7] rsync - 编译"
        run: |
          set -ex
          curl -LO https://download.samba.org/pub/rsync/src/rsync-3.2.7.tar.gz
          tar xzf rsync-3.2.7.tar.gz && cd rsync-3.2.7
          ./configure \
            --host=$HOST \
            --prefix=$PREFIX \
            --disable-xxhash \
            --disable-zstd \
            --disable-lz4 \
            --disable-openssl \
            --with-included-popt=no \
            CC="$CROSS_CC" \
            CFLAGS="$CFLAGS -I$STAGING/var/jb/usr/include" \
            LDFLAGS="$LDFLAGS -L$STAGING/var/jb/usr/lib"
          make -j$J
          mkdir -p ../deb-root-rsync/var/jb/usr/bin
          cp rsync ../deb-root-rsync/var/jb/usr/bin/
          /tmp/check-ios ../deb-root-rsync/var/jb/usr/bin/rsync

      - name: "[2/7] rsync - 打包"
        run: |
          set -ex
          cd deb-root-rsync && mkdir -p DEBIAN
          printf 'Package: org.rsync.rsync\nName: rsync\nVersion: 3.2.7\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s), org.popt.popt\nDescription: Rsync for iOS (rootless)\nMaintainer: rootless\nSection: Networking\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root-rsync rsync-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: rsync-${{ matrix.arch }}-deb
          path: rsync-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 3. GNU make
      # ========================================================
      - name: "[3/7] make - 编译"
        run: |
          set -ex
          curl -LO https://ftp.gnu.org/gnu/make/make-4.4.1.tar.gz
          tar xzf make-4.4.1.tar.gz && cd make-4.4.1
          ./configure \
            --host=$HOST \
            --prefix=$PREFIX \
            --disable-dependency-tracking \
            --disable-nls \
            --without-libintl-prefix \
            --without-libiconv-prefix \
            CC="$CROSS_CC" \
            CFLAGS="$CFLAGS" \
            LDFLAGS="$LDFLAGS"
          make -j$J
          mkdir -p ../deb-root-make/var/jb/usr/bin
          cp make ../deb-root-make/var/jb/usr/bin/
          /tmp/check-ios ../deb-root-make/var/jb/usr/bin/make

      - name: "[3/7] make - 打包"
        run: |
          set -ex
          cd deb-root-make && mkdir -p DEBIAN
          printf 'Package: org.gnu.make\nName: GNU Make\nVersion: 4.4.1\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: GNU Make for iOS (rootless)\nMaintainer: rootless\nSection: Development\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root-make make-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: make-${{ matrix.arch }}-deb
          path: make-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 4. lz4
      # ========================================================
      - name: "[4/7] lz4 - 编译"
        run: |
          set -ex
          curl -LO https://github.com/lz4/lz4/archive/refs/tags/v1.10.0.tar.gz
          tar xzf v1.10.0.tar.gz && cd lz4-1.10.0
          make -j$J \
            CC="$CROSS_CC" \
            AR="$(xcrun --sdk iphoneos -f ar)" \
            PREFIX=$PREFIX
          mkdir -p ../deb-root-lz4/var/jb/usr/bin ../deb-root-lz4/var/jb/usr/lib
          cp lz4 lz4c ../deb-root-lz4/var/jb/usr/bin/ 2>/dev/null || true
          cp lib/liblz4.dylib ../deb-root-lz4/var/jb/usr/lib/ 2>/dev/null || true
          for b in ../deb-root-lz4/var/jb/usr/bin/*; do
            [ -f "$b" ] && /tmp/check-ios "$b"
          done

      - name: "[4/7] lz4 - 打包"
        run: |
          set -ex
          cd deb-root-lz4 && mkdir -p DEBIAN
          printf 'Package: org.lz4.lz4\nName: lz4\nVersion: 1.10.0\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: LZ4 compression tools (rootless)\nMaintainer: rootless\nSection: Development\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root-lz4 lz4-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: lz4-${{ matrix.arch }}-deb
          path: lz4-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 5. perl（config.sh 写死 iOS 变量）
      # ========================================================
      - name: "[5/7] perl - 配置并编译"
        run: |
          set -ex
          curl -LO https://www.cpan.org/src/5.0/perl-5.40.0.tar.gz
          tar xzf perl-5.40.0.tar.gz && cd perl-5.40.0

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH=${{ matrix.arch }}
          _CC="$(xcrun --sdk iphoneos -f clang)"
          _LD="$(xcrun --sdk iphoneos -f clang)"

          ./Configure -des -Dprefix=$PREFIX > /dev/null 2>&1 || true

          echo "ar='$(xcrun --sdk iphoneos -f ar)'" > config.sh
          echo "cc='${_CC} -arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}'" >> config.sh
          echo "cpp='${_CC} -E -arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}'" >> config.sh
          echo "ld='${_LD} -arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}'" >> config.sh
          echo "nm='$(xcrun --sdk iphoneos -f nm)'" >> config.sh
          echo "ranlib='$(xcrun --sdk iphoneos -f ranlib)'" >> config.sh
          echo "ccflags='-arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS} -D_DARWIN_C_SOURCE -fno-stack-check'" >> config.sh
          echo "ldflags='-arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}'" >> config.sh
          echo "lddlflags='-arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS} -dynamiclib'" >> config.sh
          echo "archname='arm64-darwin'" >> config.sh
          echo "osname='darwin'" >> config.sh
          echo "osvers='24.0'" >> config.sh
          echo "myarchname='arm64-darwin'" >> config.sh
          echo "i_ndbm='undef'" >> config.sh
          echo "i_gdbm='undef'" >> config.sh
          echo "i_db='undef'" >> config.sh
          echo "d_dlopen='undef'" >> config.sh
          echo "usedl='undef'" >> config.sh
          echo "useshrplib='false'" >> config.sh
          echo "usethreads='false'" >> config.sh
          echo "use64bitint='define'" >> config.sh
          echo "usemallocwrap='n'" >> config.sh
          echo "userelocatableinc='undef'" >> config.sh
          echo "prefix='${PREFIX}'" >> config.sh
          echo "bin='${PREFIX}/bin'" >> config.sh
          echo "privlib='${PREFIX}/lib/perl5'" >> config.sh
          echo "sitelib='${PREFIX}/lib/perl5/site_perl'" >> config.sh
          echo "vendorlib='${PREFIX}/lib/perl5/vendor_perl'" >> config.sh
          echo "mansrc='none'" >> config.sh
          echo "man1dir='none'" >> config.sh
          echo "man3dir='none'" >> config.sh

          ./Configure -S
          make miniperl -j$J
          make perl -j$J

          mkdir -p ../deb-root-perl/var/jb/usr/bin ../deb-root-perl/var/jb/usr/lib/perl5
          cp perl ../deb-root-perl/var/jb/usr/bin/
          cp lib/Config.pm ../deb-root-perl/var/jb/usr/lib/perl5/ 2>/dev/null || true
          cp lib/Config_heavy.pl ../deb-root-perl/var/jb/usr/lib/perl5/ 2>/dev/null || true
          /tmp/check-ios ../deb-root-perl/var/jb/usr/bin/perl

      - name: "[5/7] perl - 打包"
        run: |
          set -ex
          cd deb-root-perl && mkdir -p DEBIAN
          printf 'Package: org.perl.perl\nName: Perl\nVersion: 5.40.0\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: Perl 5 for iOS (rootless, cross-compiled)\nMaintainer: rootless\nSection: Development\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root-perl perl-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: perl-${{ matrix.arch }}-deb
          path: perl-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 6. odcctools（静态链接 LLVM）
      # ========================================================
      - name: "[6/7] odcctools - 安装 macOS LLVM"
        run: |
          set -ex
          brew install llvm@18
          LLVM_PATH=$(brew --prefix llvm@18)
          echo "LLVM_PATH=$LLVM_PATH" >> $GITHUB_ENV

      - name: "[6/7] odcctools - 编译"
        run: |
          set -ex
          git clone --depth 1 https://github.com/tpoechtrager/cctools-port.git
          cd cctools-port/cctools

          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH=${{ matrix.arch }}
          ARCH_FLAGS="-arch ${ARCH} -isysroot ${SDK} -miphoneos-version-min=${MIN_IOS}"
          CC="$(xcrun --sdk iphoneos -f clang) ${ARCH_FLAGS}"
          CXX="$(xcrun --sdk iphoneos -f clang++) ${ARCH_FLAGS} -stdlib=libc++"
          LLVM_LIB="${LLVM_PATH}/lib"

          STATIC_LIBS="${LLVM_LIB}/libLLVM-18.a ${LLVM_LIB}/libLLVMSupport.a ${LLVM_LIB}/libLLVMDemangle.a ${LLVM_LIB}/libLLVMObject.a ${LLVM_LIB}/libLLVMBinaryFormat.a ${LLVM_LIB}/libLLVMBitReader.a ${LLVM_LIB}/libLLVMCore.a ${LLVM_LIB}/libLLVMMC.a ${LLVM_LIB}/libLLVMMCParser.a ${LLVM_LIB}/libLLVMTextAPI.a ${LLVM_LIB}/libLLVMTargetParser.a"

          ./configure \
            --host=arm64-apple-darwin \
            --prefix=$PREFIX \
            --target=arm64-apple-darwin \
            --with-llvm-config=${LLVM_PATH}/bin/llvm-config \
            CC="$CC" \
            CXX="$CXX" \
            CFLAGS="${ARCH_FLAGS} -I${LLVM_PATH}/include" \
            CXXFLAGS="${ARCH_FLAGS} -I${LLVM_PATH}/include -stdlib=libc++" \
            LDFLAGS="${ARCH_FLAGS} -L${LLVM_LIB} -Wl,-Bstatic -lLLVM-18 -lLLVMSupport -lLLVMDemangle -lLLVMObject -lLLVMBinaryFormat -lLLVMBitReader -lLLVMCore -lLLVMMC -lLLVMMCParser -lLLVMTextAPI -lLLVMTargetParser -Wl,-Bdynamic -lc++ -lSystem" \
            --disable-clang-as \
            --disable-lto 2>/dev/null || true

          make -j1 2>&1 || make -j1 LDADD="${STATIC_LIBS} -lc++ -lSystem" 2>&1

          mkdir -p ../../deb-root-odcc/var/jb/usr/bin
          BIN_COUNT=0
          for tool in ld ar nm ranlib strip lipo otool install_name_tool size strings; do
            if [ -f "$tool" ]; then
              FILE_TYPE=$(file "$tool" 2>/dev/null | grep -o "arm64\|arm64e" || true)
              if [ -n "$FILE_TYPE" ]; then
                cp "$tool" ../../deb-root-odcc/var/jb/usr/bin/
                BIN_COUNT=$((BIN_COUNT + 1))
              fi
            fi
          done
          echo "产生了 $BIN_COUNT 个 iOS 二进制"
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "❌ odcctools 编译失败"
            exit 1
          fi
          echo "done" > ../../deb-root-odcc/.built

      - name: "[6/7] odcctools - 校验"
        run: |
          set -ex
          cd deb-root-odcc
          for b in var/jb/usr/bin/*; do
            [ -f "$b" ] || continue
            echo "--- 校验: $b ---"
            file "$b"
            /tmp/check-ios "$b"
          done

      - name: "[6/7] odcctools - 打包"
        run: |
          set -ex
          cd deb-root-odcc && mkdir -p DEBIAN
          printf 'Package: org.odcctools.odcctools\nName: odcctools\nVersion: 1.0.0\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: ODCCTools for iOS (rootless, statically linked)\nMaintainer: rootless\nSection: Development\n' "$MIN_IOS" > DEBIAN/control
          cd ..
          dpkg-deb --rootless -Zgzip -b deb-root-odcc odcctools-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: odcctools-${{ matrix.arch }}-deb
          path: odcctools-${{ matrix.arch }}-rootless.deb

      # ========================================================
      # 7. swift 空壳
      # ========================================================
      - name: "[7/7] swift - 创建空壳"
        run: |
          set -ex
          mkdir -p deb-root-swift/var/jb/usr/bin
          cat > deb-root-swift/var/jb/usr/bin/swift << 'SH'
          #!/bin/sh
          echo "WARNING: Swift stub - on-device compilation unsupported." >&2
          echo "Use macOS theos for Swift tweaks." >&2
          exit 1
SH
          chmod 755 deb-root-swift/var/jb/usr/bin/swift
          mkdir -p deb-root-swift/DEBIAN
          printf 'Package: org.swift.swift-stub\nName: Swift Stub\nVersion: 1.0.0\nArchitecture: iphoneos-arm\nDepends: firmware (>= %s)\nDescription: Swift stub to satisfy theos dependency (rootless)\nMaintainer: rootless\nSection: Development\n' "$MIN_IOS" > deb-root-swift/DEBIAN/control
          dpkg-deb --rootless -Zgzip -b deb-root-swift swift-${{ matrix.arch }}-rootless.deb

      - uses: actions/upload-artifact@v4
        with:
          name: swift-${{ matrix.arch }}-deb
          path: swift-${{ matrix.arch }}-rootless.deb
